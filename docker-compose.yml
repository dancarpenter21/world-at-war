services:
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
      server:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - world-at-war
    restart: unless-stopped

  server:
    image: world-at-war-server:production
    build:
      context: .
      dockerfile: crates/server/Dockerfile
    environment:
      BIND_ADDR: 0.0.0.0:8000
      ADMIN_SETUP_TOKEN: ${ADMIN_SETUP_TOKEN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SPACETRACK_USERNAME: ${SPACETRACK_USERNAME:-}
      SPACETRACK_PASSWORD: ${SPACETRACK_PASSWORD:-}
      SPACE_CARDS_DIR: /app/data/generated/space-cards
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    volumes:
      - ./data/cache/space-track:/app/data/cache/space-track
      - ./data/generated/space-cards:/app/data/generated/space-cards:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8000/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - world-at-war
    restart: unless-stopped

  web:
    image: world-at-war-web:production
    build:
      context: .
      dockerfile: web/Dockerfile
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks:
      - world-at-war
    restart: unless-stopped

networks:
  world-at-war:
    driver: bridge
