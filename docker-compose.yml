services:
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - server
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - world-at-war

  server:
    build:
      context: .
      dockerfile: crates/server/Dockerfile
    environment:
      BIND_ADDR: 0.0.0.0:8000
      ADMIN_SETUP_TOKEN: ${ADMIN_SETUP_TOKEN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SPACETRACK_USERNAME: ${SPACETRACK_USERNAME:-}
      SPACETRACK_PASSWORD: ${SPACETRACK_PASSWORD:-}
      SPACE_CARDS_DIR: /app/data/generated/space-cards
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    volumes:
      - ./data/cache/space-track:/app/data/cache/space-track
      - ./data/generated/space-cards:/app/data/generated/space-cards:ro
    expose:
      - "8000"
    networks:
      - world-at-war

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    expose:
      - "80"
    networks:
      - world-at-war

networks:
  world-at-war:
    driver: bridge
