map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# Docker's embedded DNS is queried at request time so upstream container
# recreation does not leave the proxy pointing at an obsolete IP address.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
  listen 80;
  server_name _;
  client_max_body_size 2m;
  set $frontend web:80;
  set $backend server:8000;

  # Axum health endpoint, exposed through the same public origin as the UI.
  location = /health {
    proxy_pass http://$backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Includes HTTP API calls and /v1/games/*/stream WebSocket upgrades.
  location /v1/ {
    proxy_pass http://$backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # The web container owns static assets and SPA fallback behavior.
  location / {
    proxy_pass http://$frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
